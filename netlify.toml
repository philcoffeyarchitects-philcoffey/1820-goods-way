# Netlify build config for 1820 Goods Way pitch deck
# Connect this repo at app.netlify.com → Add new site → Import from GitHub →
# select philcoffeyarchitects-philcoffey/1820-goods-way. Netlify reads this
# file and runs the build; no manual settings required in the dashboard.

[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA-style fallback so any deep URL resolves to index.html (the deck is a
# single-page app; the router is in-memory only).
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Cache built JS/CSS aggressively — Vite hash-fingerprints every build,
# so a new deploy invalidates them by filename.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
